name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags="-s -w" -o goipy.exe ./cmd/goipy
          else
            go build -ldflags="-s -w" -o goipy ./cmd/goipy
          fi

      - name: Stage archive contents
        run: |
          stage=goipy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir -p "$stage"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp goipy.exe "$stage/"
          else
            cp goipy "$stage/"
          fi
          cp LICENSE README.md "$stage/"
          echo "STAGE=$stage" >> "$GITHUB_ENV"

      - name: Create archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${STAGE}.zip" "$STAGE"
            echo "ARCHIVE=${STAGE}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ARCHIVE=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: false
