name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Compile test fixtures
        run: |
          python3 -c "
          import py_compile, glob, os
          for src in sorted(glob.glob('internal/testdata/*.py')):
              dst = src[:-3] + '.pyc'
              py_compile.compile(src, cfile=dst, doraise=True)
          "

      - name: Test
        run: go test ./...
